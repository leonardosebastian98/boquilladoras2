<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Producción</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
:root {
  --bg: #111418; --surface: #1a1f26; --border: #2a3040;
  --text: #e2e8f0; --muted: #7a8599;
  --cyan: #1db88e; --amber: #f0a500; --red: #e24b4a;
  --green: #22c55e; --accent: #3b82f6;
  --font: 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── TOOLBAR ── */
.toolbar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px; padding: 0 14px; height: 44px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.toolbar-title { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; white-space: nowrap; }
.tb-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* ── DROPDOWNS ── */
.dd-wrapper { position: relative; }
.dd-btn {
  display: flex; align-items: center; gap: 6px; padding: 5px 10px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); cursor: pointer; font-size: 12px;
  white-space: nowrap; min-width: 140px; justify-content: space-between;
}
.dd-btn:hover { border-color: var(--accent); }
.dd-arrow { font-size: 8px; color: var(--muted); transition: transform .18s; flex-shrink: 0; }
.dd-open .dd-arrow { transform: rotate(180deg); }
.dd-menu {
  display: none; position: absolute; top: calc(100% + 3px); left: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
  min-width: 220px; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,.6);
  max-height: 340px; overflow-y: auto;
}
.dd-open .dd-menu { display: block; }
.dd-item {
  padding: 7px 12px; cursor: pointer; font-size: 12px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.dd-item:hover { background: rgba(59,130,246,.15); }
.dd-item.active { color: var(--accent); }
.dd-check { width: 11px; font-size: 10px; color: var(--accent); flex-shrink: 0; }
.dd-sep { height: 1px; background: var(--border); margin: 3px 0; }
.dd-lbl { padding: 5px 12px 1px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

/* ── STATUS BAR ── */
.statusbar {
  flex-shrink: 0; height: 30px;
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
  font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border);
}
.pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.shift-badge {
  font-size: 11px; color: var(--muted); background: var(--bg);
  border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.btn-ref {
  padding: 2px 8px; background: transparent; border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); cursor: pointer; font-size: 11px;
}
.btn-ref:hover { border-color: var(--accent); color: var(--accent); }

/* ── TOOLBAR TOGGLE ── */
.toolbar, .statusbar {
  transition: max-height .22s ease, opacity .22s ease;
  /* NO overflow:hidden here — that clips the dropdowns */
  max-height: 60px;
}
/* When hidden: collapse via max-height so overflow stays visible while open */
#app.ui-hidden .toolbar   { max-height: 0; opacity: 0; pointer-events: none; border: none; }
#app.ui-hidden .statusbar { max-height: 0; opacity: 0; pointer-events: none; border: none; }
#app.ui-hidden #error-bar { display: none !important; }

/* Toggle button — always visible, bottom-right corner */
#btn-toggle {
  position: fixed; bottom: 14px; right: 14px; z-index: 300;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, border-color .15s;
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
}
#btn-toggle:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }

/* ── CHARTS AREA — fills all remaining height, no scroll ── */
#charts-area {
  flex: 1;
  min-height: 0;          /* critical: lets flex child shrink */
  padding: 10px 12px;
  display: grid;
  gap: 10px;
}

/* ── CHART CARD — flex column, fills its grid cell ── */
.chart-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px 10px; display: flex; flex-direction: column;
  min-height: 0;           /* allow shrinking inside grid rows */
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; gap: 8px; flex-shrink: 0;
}
.card-meta { display: flex; flex-direction: column; gap: 3px; }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: .03em; text-transform: uppercase; }
.card-sub   { font-size: 14px; color: var(--muted); }
.card-kpis  { display: flex; gap: 20px; align-items: center; flex-shrink: 0; }
.kpi { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.kpi-lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
.kpi-val { font-size: 36px; font-weight: 700; line-height: 1; }
.kv-real { color: var(--amber); }
.kv-obj  { color: var(--cyan);  }
.kv-pct  { color: var(--text);  }
.s-pill  { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-top: 3px; letter-spacing: .04em; }
.p-ok    { background: rgba(34,197,94,.18); color: var(--green); }
.p-bad   { background: rgba(226,75,74,.18);  color: var(--red);   }
/* canvas fills the card's remaining space */
.chart-wrap { position: relative; flex: 1; min-height: 0; width: 100%; }
.legend { display: flex; gap: 18px; margin-top: 8px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
.leg-i  { display: flex; align-items: center; gap: 6px; }
.leg-ln { width: 20px; height: 2px; border-radius: 2px; }

/* ══════════════════════════════════════════
   RESPONSIVE MÓVIL
   ══════════════════════════════════════════ */

/* mobile-nav no existe más — eliminado */
#mobile-nav { display: none; }

@media (max-width: 700px) {
  /* App: scroll vertical normal, sin overflow:hidden */
  html, body { overflow: auto; height: auto; }
  #app { height: auto; min-height: 100vh; overflow: visible; }

  /* Toolbar compacta */
  .toolbar { gap: 6px; padding: 0 10px; height: 48px; flex-wrap: nowrap; }
  .toolbar-title { display: none; }
  .tb-sep { display: none; }
  .dd-btn { min-width: 0; padding: 4px 8px; font-size: 11px; }
  .shift-badge { display: none; }

  /* Status bar más compacta */
  .statusbar { padding: 0 10px; font-size: 10px; }

  /* Charts area: columna única, scroll vertical, sin altura fija */
  #charts-area {
    display: flex !important;          /* sobreescribir grid de desktop */
    flex-direction: column;
    padding: 8px;
    gap: 8px;
    overflow: visible;
    /* altura calculada en JS pero no bloqueante */
  }

  /* Cada card ocupa exactamente un viewport de altura */
  #charts-area .chart-card {
    display: flex;
    /* 100svh = viewport sin barra del navegador en móvil;
       fallback a 100vh si svh no está soportado */
    height: 50vh;
    height: 50svh;
    flex-shrink: 0;
  }

  /* KPIs más compactos */
  .kpi-val    { font-size: 28px; }
  .card-title { font-size: 12px; }
  .card-sub   { font-size: 11px; }

  /* Toggle button */
  #btn-toggle { bottom: 14px; right: 10px; width: 32px; height: 32px; font-size: 14px; }
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--bg); z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
}
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#error-bar {
  display: none; flex-shrink: 0; margin: 6px 12px; padding: 7px 12px;
  background: rgba(226,75,74,.1); border: 1px solid rgba(226,75,74,.3);
  border-radius: 6px; color: var(--red); font-size: 12px;
}
</style>
</head>
<body>
<div id="app">

  <div class="toolbar">
    <span class="toolbar-title">Monitor de Producción</span>
    <div class="tb-sep"></div>

    <div class="dd-wrapper" id="dd-maq">
      <button class="dd-btn" onclick="toggleDD('dd-maq')">
        <span id="lbl-maq">—</span><span class="dd-arrow">▼</span>

  <!-- mobile-nav eliminado: navegación por scroll vertical nativo -->
</div>
<button id="btn-toggle" onclick="toggleUI()" title="Mostrar / ocultar controles">☰</button>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px; color:var(--muted);" id="loading-msg">Cargando datos...</div>
</div>

<!-- ══════════════════════════════════════════
     CONFIGURACIÓN — sólo el encargado edita
     ══════════════════════════════════════════ -->
<script>
// ── MODO DE TURNO ─────────────────────────────────────────────────────────────
//   'fixed'  → turnos con horario fijo definido en TURNOS_HORARIOS
//   'auto'   → turno detectado por último gap > AUTO_SHIFT_GAP_H sin pulso TM
const TURNO_CONFIG = 'fixed';

// ── HORARIOS DE TURNO (modo 'fixed') ──────────────────────────────────────────
// Cada entrada: { inicio: 'HH:MM', fin: 'HH:MM', nombre: '...' }
//   inicio / fin en formato 24h. Si fin < inicio el turno cruza medianoche.
//
// ▼ 2 TURNOS DE 12 HORAS
const TURNOS_HORARIOS = [
  { inicio: '06:00', fin: '15:00', nombre: 'Turno 1' },
  { inicio: '22:00', fin: '06:00', nombre: 'Turno 2' },
];
// ▼ 3 TURNOS DE 8 HORAS — comentar el bloque anterior y descomentar este
// const TURNOS_HORARIOS = [
//   { inicio: '06:00', fin: '14:00', nombre: 'Turno 1' },
//   { inicio: '14:00', fin: '22:00', nombre: 'Turno 2' },
//   { inicio: '22:00', fin: '06:00', nombre: 'Turno 3' },
// ];

// ── MODO AUTO ─────────────────────────────────────────────────────────────────
const AUTO_SHIFT_GAP_H = 6;   // horas sin pulso TM → corte de turno

// ── GENERAL ───────────────────────────────────────────────────────────────────
const TCO_DEFAULT = 240;       // segundos, fallback si no viene de CSV de órdenes

// ── BALANCINES: objetivo de golpes por ventana de tiempo ────────────────────
// GOL_OBJETIVO_VENTANA: golpes esperados en GOL_VENTANA_MIN minutos
const GOL_VENTANA_MIN  = 5;     // duración de cada ventana en minutos
const GOL_OBJETIVO_VENTANA = 1050; // golpes objetivo por ventana

const MACHINE_CONFIGS = {
  armadoras: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVrHs_GXmZGUMaOBjo4zr6mtNbFpf45WZ916Bj6LktK0i1F1gofWV_dnZfjam7MAbhDoQap_nZryeO/pub?gid=0&single=true&output=csv',
    name: 'Armadoras', tco: 240,
    ordersUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSziuoyPsKM3b1ndIAtcfyCGwy-2pvdOzjt0k0cACsxdhMkEv8pynKY8Ff1ryoBAg/pub?gid=1277864885&single=true&output=csv'
  },
  expansoras: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkBYlgzc71g76k03IhGUA29lNMKjJl1rgB9WwzXcxT4uHgvzsySXs5tAuQHqQKglMLFgao6u4enqPC/pub?gid=0&single=true&output=csv',
    name: 'Expansoras', tco: 35
  },
  boquilladoras: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyXM96q2hm6rpG8lqZC6MyFOpWmrofOyUh2wHuSByLUODy1AW3gwmurN3l_L8OUjVNyKzZnf9PQAg6/pub?gid=0&single=true&output=csv',
    name: 'Boquilladoras', tco: 120,
    ordersUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSziuoyPsKM3b1ndIAtcfyCGwy-2pvdOzjt0k0cACsxdhMkEv8pynKY8Ff1ryoBAg/pub?gid=1885523891&single=true&output=csv'
  },
  engrafadoras: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTey6-OpEpD1e2CBoJgya6E2aUjlexIIwEnbTYsXT2yXjU-1VFDYcJYDcRCYgw6HEI3crJMNSShjI3g/pub?gid=0&single=true&output=csv',
    name: 'Engrafadoras', tco: 36,
    ordersUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSziuoyPsKM3b1ndIAtcfyCGwy-2pvdOzjt0k0cACsxdhMkEv8pynKY8Ff1ryoBAg/pub?gid=898232097&single=true&output=csv'
  },
  inyectora_km4000: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQB4WKu2lAwiBUY2-RBqF69LjB4US4V3tHS5-HFmPtTIMmX1Gy-tWx4wC5ER76Bz8n7pEQIzrvpEiYQ/pub?gid=0&single=true&output=csv',
    name: 'Inyectora KM4000', tco: 180
  },
  inyectora_cosmos: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKIOPE8g77gFjoCKpJt8P-sBUvgv2Nb-AX4650AB8FOYo84TKMCM0hztArZJu6Ci2gKz7tysF8TneW/pub?gid=0&single=true&output=csv',
    name: 'Inyectora Cosmos 1500', tco: 210
  },
  balancines: {
    csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToWFuhar0t6IouJWXKsQrNM7odX5io3O0EvKoax8T0L23HMpgWzTO3A__49IdxueKu7V97U4eV2It9/pub?gid=0&single=true&output=csv',
    name: 'Balancines',
    tco: null,
    isGolMode: true,   // usa código GOL en vez de TM
    description: 'Golpes cada 5 minutos (código GOL)'
  }
};
</script>

<script>
// ══════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════
let currentMachine = 'engrafadoras'; // máquina seleccionada al abrir (clave de MACHINE_CONFIGS)
let currentView    = 'range_6_7';    // vista inicial: 'all' | 'line_N' | 'range_N_M' (índices base 0)
let allEquipos     = [];   // strings (valores directos del CSV, ej: "221")
let charts         = {};
let _rows          = [];
let countdownTimer = null;
let countdownSecs  = 60;
// Órdenes de fabricación indexadas por equipo: { '221': [...], 'ALL': [...] }
let fabricationOrders = {};

// ══════════════════════════════════════════
//  HELPERS DE FECHA
// ══════════════════════════════════════════
function parseRowDate(row) {
  const dp = row.datedata.split('/');
  if (dp.length < 3) return new Date(0);
  const d = +dp[0], m = +dp[1] - 1, y = +dp[2];
  const tp = row.timestamp.split(':');
  return new Date(y, m, d, +tp[0]||0, +tp[1]||0, +tp[2]||0);
}

// Convierte "HH:MM" en { h, m }
function parseHM(str) {
  const p = str.split(':');
  return { h: +p[0], m: +(p[1] || 0) };
}

// Dado un string "HH:MM" y una fecha de referencia, devuelve el Date más
// reciente (hoy o ayer) cuya hora coincida y sea <= now.
function lastOccurrence(hmStr, now) {
  const { h, m } = parseHM(hmStr);
  const candidate = new Date(now);
  candidate.setHours(h, m, 0, 0);
  if (candidate > now) candidate.setDate(candidate.getDate() - 1);
  return candidate;
}

// ══════════════════════════════════════════
//  DETECCIÓN DE TURNO
// ══════════════════════════════════════════
function getShiftInfo(rows) {
  const now = new Date();

  // ── MODO AUTO ──────────────────────────────────────────────────────────────
  if (TURNO_CONFIG === 'auto') {
    // Rango amplio: últimas 48 h
    const lookback = new Date(now.getTime() - 48 * 3600000);
    const times = rows
      .filter(r => r.codigo === 'TM')
      .map(r => parseRowDate(r))
      .filter(dt => dt >= lookback && dt <= now)
      .sort((a, b) => a - b);

    // Inicio del turno = primer pulso tras el último gap > umbral
    let shiftStart = times.length ? times[0] : new Date(now.getTime() - 12 * 3600000);
    for (let i = times.length - 1; i > 0; i--) {
      if ((times[i] - times[i-1]) / 3600000 > AUTO_SHIFT_GAP_H) {
        shiftStart = times[i];
        break;
      }
    }
    const shiftEnd = new Date(shiftStart.getTime() + 12 * 3600000);
    const fmtA = d => d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    return { shiftStartDate: shiftStart, shiftEndDate: shiftEnd,
             label: `Turno automático  ${fmtA(shiftStart)} – ${fmtA(shiftEnd)}`, turnoIdx: -1 };
  }

  // ── MODO FIXED ─────────────────────────────────────────────────────────────
  // Construir todos los candidatos con su inicio y fin calculados
  const fmt = d => d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

  const candidates = TURNOS_HORARIOS.map((t, i) => {
    const start = lastOccurrence(t.inicio, now);
    const { h: fh, m: fm } = parseHM(t.fin);
    const end = new Date(start);
    end.setHours(fh, fm, 0, 0);
    if (end <= start) end.setDate(end.getDate() + 1);
    return { idx: i, cfg: t, start, end };
  });

  // Turno activo: el más reciente cuyo rango [start, end) contiene now
  const active = candidates
    .filter(c => now >= c.start && now < c.end)
    .sort((a, b) => b.start - a.start)[0];

  if (active) {
    // Estamos dentro de un turno
    return {
      shiftStartDate: active.start,
      shiftEndDate:   active.end,
      label:          `${active.cfg.nombre}  ${fmt(active.start)} – ${fmt(active.end)}`,
      turnoIdx:       active.idx,
      isActive:       true
    };
  }

  // Fuera de turno: usar el turno más reciente que ya terminó
  const past = candidates
    .filter(c => now >= c.end)
    .sort((a, b) => b.end - a.end)[0]
    || candidates.sort((a, b) => b.start - a.start)[0]; // fallback

  return {
    shiftStartDate: past.start,
    shiftEndDate:   past.end,
    label:          `${past.cfg.nombre}  ${fmt(past.start)} – ${fmt(past.end)} (último turno)`,
    turnoIdx:       past.idx,
    isActive:       false   // ← fuera de horario, mostrando datos del turno anterior
  };
}

// ══════════════════════════════════════════
//  CSV PARSE
// ══════════════════════════════════════════
function parseCSV(text) {
  const lines   = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1)
    .map(line => {
      const v = line.split(',');
      const o = {};
      headers.forEach((h, i) => { o[h] = (v[i] || '').trim(); });
      return o;
    })
    .filter(r => r.datedata && r.timestamp && r.codigo);
}

// ══════════════════════════════════════════
//  SERIES MODO GOL (Balancines)
// ══════════════════════════════════════════
// Cada fila GOL contiene la cantidad de golpes dados en la ventana.
// Graficamos valor real de cada ventana (barras/puntos) vs línea objetivo flat.
// El acumulado del turno se muestra en los KPIs.
function buildGolSeries(rows, equipoId) {
  const now = new Date();
  const si  = getShiftInfo(rows);
  const viewEnd = new Date(now.getTime() + 30 * 60000);
  const xMax    = viewEnd < si.shiftEndDate ? viewEnd : si.shiftEndDate;

  // Eventos GOL del equipo en el turno, únicos, ordenados
  const seen   = new Set();
  const events = rows
    .filter(r => r.equipo === equipoId && r.codigo === 'GOL')
    .map(r => ({ dt: parseRowDate(r), val: +r.valor }))
    .filter(r => r.dt >= si.shiftStartDate && r.dt <= now)
    .sort((a, b) => a.dt - b.dt)
    .filter(r => {
      const k = r.dt.getTime() + '_' + r.val;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });

  // Acumulado real: igual que TM, cada GOL suma su valor al total
  const realPts = [{ x: si.shiftStartDate.getTime(), y: 0 }];
  let cumul = 0;
  events.forEach(e => {
    cumul += e.val;
    realPts.push({ x: e.dt.getTime(), y: cumul });
  });
  realPts.push({ x: now.getTime(), y: cumul });

  // Objetivo: rampa lineal — golpes/ms × tiempo transcurrido
  // KPI = valor a now (congelado al fin del turno)
  // Línea gráfica = rampa hasta now, luego proyección hasta xMax
  const golPorMs = GOL_OBJETIVO_VENTANA / (GOL_VENTANA_MIN * 60000);
  const objCapAt = now < si.shiftEndDate ? now : si.shiftEndDate; // congela al fin de turno
  const objNow   = (objCapAt - si.shiftStartDate) * golPorMs;     // KPI: valor a now
  const objPts = [
    { x: si.shiftStartDate.getTime(), y: 0 },
    { x: objCapAt.getTime(),          y: objNow },                 // hasta now (o fin turno)
    { x: xMax.getTime(),              y: (xMax - si.shiftStartDate) * golPorMs } // proyección
  ];

  const pct = objNow > 0 ? (cumul / objNow) * 100 : 0;

  return {
    realPts, objPts,
    current: cumul,
    objNow,
    pct,
    xMin: si.shiftStartDate.getTime(),
    xMax: xMax.getTime(),
    xShiftStart: si.shiftStartDate.getTime(),
    xShiftEnd:   si.shiftEndDate.getTime()
  };
}

//  ÓRDENES DE FABRICACIÓN
// ══════════════════════════════════════════

// Parsea CSV de órdenes respetando comillas (celdas con comas internas)
function parseOrdersCSV(text) {
    const lines = text.trim().split('\n');
  const result = [];
  for (const line of lines) {
    // Split respetando comillas dobles
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cells.push(cur.trim());
    result.push(cells);
  }
  return result;
}

// Convierte "14/3/26" o "14/3/2026" + "12:00 p.m." / "14:00" → Date
function parseOrderDateTime(dateStr, timeStr) {
  if (!dateStr || dateStr.trim() === '' || dateStr.trim().toLowerCase() === 'x') return null;
  const dp = dateStr.trim().split('/');
  if (dp.length < 3) return null;
  let d = +dp[0], m = +dp[1] - 1, y = +dp[2];
  if (y < 100) y += 2000;

  let h = 0, min = 0;
  if (timeStr) {
    const ts = timeStr.trim();
    const isPM = /p\.?m/i.test(ts);
    const isAM = /a\.?m/i.test(ts);
    const nums = ts.replace(/[^0-9:]/g, '');
    const tp = nums.split(':');
    h = +tp[0] || 0; min = +tp[1] || 0;
    if (isPM && h < 12) h += 12;
    if (isAM && h === 12) h = 0;
  }
  return new Date(y, m, d, h, min, 0);
}

// Parsea la columna Maquina → array de strings de equipo IDs
function parseMachineColumn(val) {
  if (!val || val.trim() === '') return [];
  return val.split(',').map(s => s.trim()).filter(Boolean);
}

// Procesa el CSV de órdenes y rellena fabricationOrders
function processOrders(csvText) {
  fabricationOrders = {};
  if (!csvText) return;

  const rows   = parseOrdersCSV(csvText);
  if (rows.length < 2) return;
  // headers: IDRecepcion, Material, Cantidad Prevista, Ciclo x Unidad (s),
  //          Categoria, Fecha, Hora, Maquina, Fecha Fin, Hora Fin
  const data = rows.slice(1); // saltar encabezado

  // Separar sentinela (última fila sin IDRecepcion pero con Fecha Fin)
  let sentinelTime = null;
  const lastRow = data[data.length - 1];
  if (lastRow && (!lastRow[0] || !lastRow[0].trim())) {
    sentinelTime = parseOrderDateTime(lastRow[8], lastRow[9]);
  }

  // Construir órdenes válidas (Fecha != 'x' y tiene IDRecepcion)
  const orders = [];
  for (const r of data) {
    const id = (r[0] || '').trim();
    if (!id) continue;
    const fechaStr = (r[5] || '').trim();
    if (fechaStr.toLowerCase() === 'x') continue;

    const startTime = parseOrderDateTime(fechaStr, r[6]);
    if (!startTime) continue;

    const tcoVal   = parseFloat(r[3]) || null;
    const machines = parseMachineColumn(r[7]);

    // endTime explícito (columnas 8-9)
    const endExplicit = parseOrderDateTime((r[8] || '').trim(), r[9]);

    orders.push({
      orderNum:  id,
      model:     (r[1] || '').trim(),
      qty:       parseFloat(r[2]) || 0,
      tco:       tcoVal,
      startTime: startTime.getTime(),
      endExplicit: endExplicit ? endExplicit.getTime() : null,
      machines                           // [] → ALL
    });
  }

  // Calcular endTime de cada orden
  // Prioridad: 1) explícito  2) inicio siguiente orden mismo equipo  3) sentinela  4) now
  orders.forEach((ord, idx) => {
    if (ord.endExplicit) { ord.endTime = ord.endExplicit; return; }

    // Siguiente orden del mismo equipo (o ALL si esta es ALL)
    const sameGroup = orders.slice(idx + 1).find(o =>
      o.machines.length === 0 && ord.machines.length === 0 ||
      o.machines.some(m => ord.machines.includes(m))
    );
    if (sameGroup) { ord.endTime = sameGroup.startTime; return; }
    if (sentinelTime) { ord.endTime = sentinelTime.getTime(); return; }
    ord.endTime = Date.now();
  });

  // Distribuir en fabricationOrders indexado por equipo
  orders.forEach(ord => {
    const key = ord.machines.length === 0 ? 'ALL'
              : ord.machines.length === 1 ? ord.machines[0]
              : null; // multi-equipo → agregar a cada uno

    if (ord.machines.length === 0) {
      if (!fabricationOrders['ALL']) fabricationOrders['ALL'] = [];
      fabricationOrders['ALL'].push(ord);
    } else {
      ord.machines.forEach(m => {
        if (!fabricationOrders[m]) fabricationOrders[m] = [];
        fabricationOrders[m].push(ord);
      });
    }
  });
}

// Devuelve el TCO activo para un equipo en un timestamp dado.
// Retroactivo: si existe una única orden para el equipo en el turno,
// se aplica desde el inicio del turno aunque el timestamp sea anterior a su startTime.
function getTCOForTimestamp(ts, equipoId) {
  const specific = fabricationOrders[equipoId] || [];
  const all      = fabricationOrders['ALL']    || [];
  const combined = [...specific, ...all];

  // 1. Orden exacta que contiene el timestamp
  const active = combined.find(o => ts >= o.startTime && ts < o.endTime);
  if (active && active.tco) return active.tco;

  // 2. Retroactivo: solo órdenes sin fin explícito o cuyo fin no ha pasado aún
  //    Si hay una orden activa para el turno (sin fecha de fin), aplicar su TCO
  const withTco = combined.filter(o => o.tco && (!o.endExplicit || o.endTime > ts));
  if (withTco.length === 1) return withTco[0].tco;
  if (withTco.length > 1) {
    // Múltiples: la más cercana anterior al timestamp
    const past = withTco.filter(o => o.startTime <= ts).sort((a, b) => b.startTime - a.startTime);
    if (past.length) return past[0].tco;
    const future = withTco.sort((a, b) => a.startTime - b.startTime);
    if (future.length) return future[0].tco;
  }

  return MACHINE_CONFIGS[currentMachine].tco || TCO_DEFAULT;
}

// Devuelve las órdenes activas para un equipo (específicas + ALL)
function getOrdersForEquipo(equipoId) {
  const specific = (fabricationOrders[equipoId] || []).slice();
  const all      = (fabricationOrders['ALL']    || []).slice();
  return [...specific, ...all].sort((a, b) => a.startTime - b.startTime);
}

// ══════════════════════════════════════════
//  SERIES POR EQUIPO (modo TM normal)
// ══════════════════════════════════════════
function buildEquipoSeries(rows, equipoId, tco) {
  const now = new Date();
  const si  = getShiftInfo(rows);
  const viewEnd = new Date(now.getTime() + 30 * 60000);
  const xMax    = viewEnd < si.shiftEndDate ? viewEnd : si.shiftEndDate;

  // TM únicos del equipo en el turno
  const seen   = new Set();
  const events = rows
    .filter(r => r.equipo === equipoId && r.codigo === 'TM')
    .map(r => ({ dt: parseRowDate(r), val: +r.valor }))
    .filter(r => r.dt >= si.shiftStartDate && r.dt <= now)
    .sort((a, b) => a.dt - b.dt)
    .filter(r => {
      const k = r.dt.getTime() + '_' + r.val;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });

  // Acumulado real
  const realPts = [{ x: si.shiftStartDate.getTime(), y: 0 }];
  let cumul = 0;
  events.forEach(e => { cumul++; realPts.push({ x: e.dt.getTime(), y: cumul }); });
  realPts.push({ x: now.getTime(), y: cumul });

  // Objetivo con TCO dinámico por orden de fabricación
  // Construimos la rampa recorriendo el tiempo en pasos de 1 min,
  // cambiando la pendiente según qué orden esté activa en cada momento.
  // KPI = valor acumulado a objCapAt (congelado al fin del turno).
  const objCapAt = now < si.shiftEndDate ? now : si.shiftEndDate;
  const objPts   = [{ x: si.shiftStartDate.getTime(), y: 0 }];
  const STEP_MS  = 60000; // resolución: 1 minuto
  let   objAcum  = 0;
  let   tCur     = si.shiftStartDate.getTime();
  const tEnd     = xMax.getTime();
  while (tCur < tEnd) {
    const tNext  = Math.min(tCur + STEP_MS, tEnd);
    const segTco = getTCOForTimestamp(tCur, equipoId);
    objAcum     += (tNext - tCur) / 1000 / segTco; // piezas en este segmento
    objPts.push({ x: tNext, y: objAcum });
    tCur = tNext;
  }
  // KPI: valor del objetivo exactamente en objCapAt
  const objNow = (() => {
    let acc = 0, t = si.shiftStartDate.getTime();
    const cap = objCapAt.getTime();
    while (t < cap) {
      const tn  = Math.min(t + STEP_MS, cap);
      acc += (tn - t) / 1000 / getTCOForTimestamp(t, equipoId);
      t = tn;
    }
    return acc;
  })();

  const pct = objNow > 0 ? (cumul / objNow) * 100 : 0;

  return {
    realPts, objPts,
    current: cumul, objNow, pct,
    xMin: si.shiftStartDate.getTime(),
    xMax: xMax.getTime(),
    xShiftStart: si.shiftStartDate.getTime(),
    xShiftEnd:   si.shiftEndDate.getTime()
  };
}

function getEquipoMeta(rows, equipoId) {
  const rss = rows.find(r => r.equipo === equipoId && r.codigo === 'RSS' && r.valor && r.valor.length > 5);
  return rss ? rss.valor : equipoId;
}

function toggleDD(id) {
  const wasOpen = document.getElementById(id).classList.contains('dd-open');
  document.querySelectorAll('.dd-wrapper').forEach(el => el.classList.remove('dd-open'));
  if (!wasOpen) document.getElementById(id).classList.add('dd-open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrapper'))
    document.querySelectorAll('.dd-wrapper').forEach(el => el.classList.remove('dd-open'));
});

function buildMachineMenu() {
  const menu = document.getElementById('menu-maq');
  menu.innerHTML = '<div class="dd-lbl">Grupo de máquinas</div>';
  Object.entries(MACHINE_CONFIGS).forEach(([key, cfg]) => {
    const d = document.createElement('div');
    d.className = 'dd-item' + (key === currentMachine ? ' active' : '');
    d.innerHTML = `<span class="dd-check">${key === currentMachine ? '✓' : ''}</span>${cfg.name}`;
    d.onclick = () => { selectMachine(key); toggleDD('dd-maq'); };
    menu.appendChild(d);
  });
  document.getElementById('lbl-maq').textContent = MACHINE_CONFIGS[currentMachine].name;
}

// IMPORTANTE: las vistas usan ÍNDICE numérico en allEquipos, NO el id del equipo.
// Esto evita el bug de equipos con ids que contienen '_' o son strings.
// value = 'all' | 'line_IDX' | 'range_IDXA_IDXB'
function buildViewMenu() {
  const menu = document.getElementById('menu-view');
  menu.innerHTML = '';
  const n = allEquipos.length;

  function add(opt) {
    if (opt.sep) { const s = document.createElement('div'); s.className = 'dd-sep'; menu.appendChild(s); return; }
    if (opt.lbl) { const l = document.createElement('div'); l.className = 'dd-lbl'; l.textContent = opt.lbl; menu.appendChild(l); return; }
    const d = document.createElement('div');
    d.className = 'dd-item' + (opt.v === currentView ? ' active' : '');
    d.innerHTML = `<span class="dd-check">${opt.v === currentView ? '✓' : ''}</span>${opt.t}`;
    d.onclick = () => { selectView(opt.v, opt.t); toggleDD('dd-view'); };
    menu.appendChild(d);
  }

  add({ lbl: 'Vista general' });
  add({ v: 'all', t: 'Todas las líneas' });

  if (n > 0) {
    add({ sep: true });
    add({ lbl: 'Línea individual' });
    allEquipos.forEach((eq, i) => {
      add({ v: `line_${i}`, t: `Línea ${i + 1}  (equipo ${eq})` });
    });
  }

  if (n >= 3) {
    add({ sep: true });
    add({ lbl: 'Rango de líneas' });
    for (let a = 0; a < n - 1; a++) {
      for (let b = a + 1; b < n; b++) {
        add({ v: `range_${a}_${b}`, t: `Líneas ${a + 1} → ${b + 1}` });
      }
    }
  }
}

// Devuelve array de strings (equipoId) — subset de allEquipos
function getVisibleEquipos() {
  if (currentView === 'all') return allEquipos;

  if (currentView.startsWith('line_')) {
    const idx = parseInt(currentView.substring(5), 10);
    return allEquipos[idx] !== undefined ? [allEquipos[idx]] : allEquipos;
  }

  if (currentView.startsWith('range_')) {
    // 'range_A_B' → idx A a B inclusive
    const rest = currentView.substring(6);          // "A_B"
    const sep  = rest.indexOf('_');
    const ia   = parseInt(rest.substring(0, sep), 10);
    const ib   = parseInt(rest.substring(sep + 1),  10);
    return allEquipos.slice(ia, ib + 1);
  }

  return allEquipos;
}

function selectMachine(key) {
  currentMachine = key;
  currentView    = 'all';
  document.getElementById('lbl-view').textContent = 'Todas las líneas';
  loadData();
}

function selectView(value, text) {
  currentView = value;
  document.getElementById('lbl-view').textContent = text;
  renderCharts();
}

//  RENDER CHARTS
// ══════════════════════════════════════════
function renderCharts() {
  const area    = document.getElementById('charts-area');
  const cfg     = MACHINE_CONFIGS[currentMachine];
  const tco     = cfg.tco || TCO_DEFAULT;
  const visible = getVisibleEquipos();
  const single  = visible.length === 1;

  // Limpiar
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
  area.innerHTML = '';

  // Grid desktop: columnas + filas explícitas para llenar viewport
  // En móvil el CSS sobreescribe a flex-column, este grid no aplica
  area.className = '';
  area.style.overflowY = 'hidden';
  const cols = single ? 1
             : visible.length === 2 ? 2
             : visible.length <= 4  ? 2
             : visible.length <= 9  ? 3 : 4;
  const rows = Math.ceil(visible.length / cols);
  area.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  area.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;

  visible.forEach(eqId => {
    const lineNum  = allEquipos.indexOf(eqId) + 1;
    const meta     = getEquipoMeta(_rows, eqId);
    const isGol    = !!cfg.isGolMode;
    const s        = isGol ? buildGolSeries(_rows, eqId)
                           : buildEquipoSeries(_rows, eqId, tco);
    const ok       = s.pct >= 90;

    // ── Textos adaptativos según modo ──
    const golPorH     = (GOL_OBJETIVO_VENTANA / GOL_VENTANA_MIN * 60).toFixed(0);
    // Para modo TM: buscar orden relevante para el equipo y mostrar sus datos
    let activeTco = tco;
    let subtitleTxt;
    if (isGol) {
      subtitleTxt = `${cfg.name} &middot; GOL &middot; ${GOL_OBJETIVO_VENTANA} golpes / ${GOL_VENTANA_MIN} min &middot; ${golPorH} golpes/h`;
    } else {
      const allOrds = [...(fabricationOrders[eqId] || []), ...(fabricationOrders['ALL'] || [])];
      const now_ts  = Date.now();
      // Prioridad:
      // 1) Orden que contiene now en su rango [startTime, endTime)
      // 2) Orden sin endTime explícito (en curso, sin fecha de fin definida)
      // 3) Fallback al TCO del config — no mostrar órdenes ya finalizadas
      const activeOrd = allOrds.find(o => now_ts >= o.startTime && now_ts < o.endTime)
                     || allOrds.find(o => !o.endExplicit && o.startTime <= now_ts);
      if (activeOrd) {
        activeTco = activeOrd.tco || tco;
        const pzasH = (3600 / activeTco).toFixed(1);
        const parts = [cfg.name, `TCO ${activeTco}s`, `${pzasH} pzas/h`];
        if (activeOrd.model) parts.push(`<span style="color:var(--text);font-weight:600">${activeOrd.model}</span>`);
        if (activeOrd.orderNum) parts.push(`<span style="color:var(--muted)">${activeOrd.orderNum}</span>`);
        subtitleTxt = parts.join(' &middot; ');
      } else {
        subtitleTxt = `${cfg.name} &middot; TCO ${activeTco}s &middot; ${(3600/activeTco).toFixed(1)} pzas/h`;
      }
    }
    const realLbl   = 'Real';
    const objLbl    = isGol ? 'Objetivo' : 'Objetivo';
    const realVal   = Math.round(s.current);
    const objVal    = Math.round(s.objNow);
    const pctVal    = s.pct.toFixed(1) + '%';
    const extraKpi  = '';
    const legendTxt = isGol
      ? `<span class="leg-i"><span class="leg-ln" style="background:var(--amber)"></span>Golpes / ventana (GOL)</span>
         <span class="leg-i"><span class="leg-ln" style="background:var(--cyan); opacity:.7"></span>Objetivo (${GOL_OBJETIVO_VENTANA} golpes)</span>`
      : `<span class="leg-i"><span class="leg-ln" style="background:var(--amber)"></span>Real (TM)</span>
         <span class="leg-i"><span class="leg-ln" style="background:var(--cyan); opacity:.7"></span>Objetivo (TCO ${tco}s)</span>`;

    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-meta">
          <div class="card-title">EQUIPO  ${eqId} </div>
          <div class="card-sub">${subtitleTxt}</div>
        </div>
        <div class="card-kpis">
          <div class="kpi">
            <span class="kpi-lbl">${realLbl}</span>
            <span class="kpi-val kv-real">${realVal}</span>
          </div>
          <div class="kpi">
            <span class="kpi-lbl">${objLbl}</span>
            <span class="kpi-val kv-obj">${objVal}</span>
          </div>
          <div class="kpi">
            <span class="kpi-lbl">%</span>
            <span class="kpi-val kv-pct">${pctVal}</span>
            <span class="s-pill ${ok ? 'p-ok' : 'p-bad'}">${ok ? 'EN META' : 'BAJO'}</span>
          </div>
          ${extraKpi}
        </div>
      </div>
      <div class="chart-wrap" id="wrap-${eqId}"><canvas id="cv-${eqId}"></canvas></div>
      <div class="legend">${legendTxt}</div>
    `;
    area.appendChild(card);

    // Chart.js — construir configuración según modo
    requestAnimationFrame(() => {
      const canvas = document.getElementById(`cv-${eqId}`);
      if (!canvas) return;

      // Dataset real: línea en ambos modos
      const realDataset = {
        label: isGol ? 'Golpes' : 'Real',
        data: s.realPts,
        borderColor: '#f0a500',
        borderWidth: 2.5,
        pointRadius: isGol ? 0 : 0,
        pointHoverRadius: 5,
        tension: 0.35,
        fill: false
      };

      charts[eqId] = new Chart(canvas, {
        type: 'line',
        data: {
          datasets: [
            {
              label: 'Objetivo',
              data: s.objPts,
              borderColor: '#1db88e',
              borderWidth: isGol ? 2 : 1.5,
              borderDash: isGol ? [] : [5, 4],
              pointRadius: 0,
              tension: 0,
              fill: false
            },
            realDataset
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 300 },
          layout: { padding: { top: 4, right: 4, bottom: 0, left: 0 } },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title: items => new Date(items[0].parsed.x).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }),
                label: c => isGol
                  ? `${c.dataset.label}: ${Math.round(c.parsed.y)} golpes`
                  : `${c.dataset.label}: ${Math.round(c.parsed.y)} uds`
              }
            },
            annotation: (() => {
              const ann = {
                lineStart: {
                  type: 'line', scaleID: 'x', value: s.xShiftStart,
                  borderColor: 'rgba(59,130,246,0.55)', borderWidth: 1.5, borderDash: [4, 3],
                  label: { content: 'Inicio turno', display: true, position: 'start',
                           color: '#3b82f6', font: { size: 10 }, backgroundColor: 'transparent', padding: 2 }
                },

                  type: 'line', scaleID: 'x', value: s.xShiftEnd,

                }
              };
              // Sin anotaciones de órdenes en el gráfico — la info se muestra en el subtitle del card

            })()
          },
          scales: {

              type: 'time',

              ticks: { color: '#9aa3b2', font: { size: 12 }, maxRotation: 0 },
              grid:  { color: 'rgba(42,48,64,.7)' },
              border: { color: 'rgba(42,48,64,.7)' }
            },
            y: {
              min: 0,
              ticks: { color: '#9aa3b2', font: { size: 12 } },
              grid:  { color: 'rgba(42,48,64,.7)' },
              border: { color: 'rgba(42,48,64,.7)' }
            }
          }
        }
      });
    });
  });

  // En móvil, resize tras render para que Chart.js tome las dimensiones CSS
  if (isMobile()) resizeAllCharts();
}

// ══════════════════════════════════════════
//  FETCH & LOAD
// ══════════════════════════════════════════
async function loadData() {
  showLoading('Cargando datos...');
  hideError();
  try {
    const cfg = MACHINE_CONFIGS[currentMachine];

    // Fetch producción y órdenes en paralelo
    const fetches = [fetch(cfg.csvUrl + '&_nc=' + Date.now())];
    if (cfg.ordersUrl) fetches.push(fetch(cfg.ordersUrl + '&_nc=' + Date.now()));

    const results = await Promise.all(fetches);
    if (!results[0].ok) throw new Error('HTTP ' + results[0].status);
    _rows = parseCSV(await results[0].text());

    // Procesar órdenes si hay URL configurada
    if (cfg.ordersUrl && results[1] && results[1].ok) {
      processOrders(await results[1].text());
    } else {
      fabricationOrders = {}; // limpiar si no hay órdenes
    }

    // Detectar turno activo
    const si  = getShiftInfo(_rows);
    const cfg2 = MACHINE_CONFIGS[currentMachine];
    const codigoFiltro = cfg2.isGolMode ? 'GOL' : 'TM';

    // Equipos: todos los que tienen CUALQUIER pulso en el CSV (sin filtro de turno).
    // Así aparece la card aunque el equipo no haya producido en el turno actual
    // o estemos fuera de horario. El gráfico simplemente quedará vacío o mostrará
    // los datos disponibles del turno de referencia.
    allEquipos = [...new Set(
      _rows
        .filter(r => r.codigo === codigoFiltro)
        .map(r => r.equipo)
    )].sort((a, b) => parseInt(a, 10) - parseInt(b, 10));

    buildMachineMenu();  // siempre: actualiza checkmark de máquina activa
    buildViewMenu();     // siempre: reconstruye opciones con allEquipos actualizado

    renderCharts();

    const badge = document.getElementById('shift-badge');
    badge.textContent = si.label;
    badge.style.color        = si.isActive === false ? 'var(--amber)' : '';
    badge.style.borderColor  = si.isActive === false ? 'rgba(240,165,0,.4)' : '';
    document.getElementById('status-txt').textContent =
      `${cfg.name} · ${new Date().toLocaleTimeString('es-AR')}`;

    hideLoading();
    resetCountdown();
  } catch(err) {
    hideLoading();
    showError('Error al obtener datos: ' + err.message);
    resetCountdown();
  }
}

// ══════════════════════════════════════════
//  COUNTDOWN
// ══════════════════════════════════════════
function resetCountdown() {
  clearInterval(countdownTimer);
  countdownSecs = 900; // Timer
  countdownTimer = setInterval(() => {
    countdownSecs--;
    document.getElementById('countdown').textContent = `Auto-refresh: ${countdownSecs}s`;
    if (countdownSecs <= 0) { clearInterval(countdownTimer); loadData(); }
  }, 1000);
}
function manualRefresh() { clearInterval(countdownTimer); loadData(); }

function showLoading(m) { document.getElementById('loading-msg').textContent = m; document.getElementById('loading').style.display = 'flex'; }
function hideLoading()  { document.getElementById('loading').style.display = 'none'; }
function showError(m)   { const b = document.getElementById('error-bar'); b.textContent = m; b.style.display = 'block'; }
function hideError()    { document.getElementById('error-bar').style.display = 'none'; }

// ── TOOLBAR TOGGLE
let uiVisible = true;
function toggleUI() {
  uiVisible = !uiVisible;
  const app = document.getElementById('app');
  const btn = document.getElementById('btn-toggle');
  app.classList.toggle('ui-hidden', !uiVisible);
  btn.textContent = uiVisible ? '☰' : '⚙';
  btn.title       = uiVisible ? 'Ocultar controles' : 'Mostrar controles';
  // Resize charts after transition ends so Chart.js picks up new dimensions
  setTimeout(() => {
    Object.values(charts).forEach(c => { try { c.resize(); } catch(e){} });
  }, 250);
}

// ── MOBILE ──────────────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 700; }

// En móvil los charts necesitan resize después de que el layout flex
// los coloca en su posición final (el CSS les da 100svh de altura).
function resizeAllCharts() {
  setTimeout(() => {
    Object.values(charts).forEach(c => { try { c.resize(); } catch(e){} });
  }, 100);
}

window.addEventListener('resize', resizeAllCharts);

// ── INIT
loadData(); // buildMachineMenu y buildViewMenu se llaman dentro de loadData
</script>
